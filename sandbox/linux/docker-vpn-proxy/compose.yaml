name: vpn-proxy

volumes:
  ovpn-processed:

services:
  ovpn-init:
    image: docker.io/library/alpine:latest
    volumes:
      - ${OVPN_FILE}:/mnt/client.ovpn:ro
      - ovpn-processed:/mnt/processed
    command: >
      sh -c "IP=$(getent hosts host.containers.internal | awk '{print $1}') &&
             sed s/host.containers.internal/$$IP/g /mnt/client.ovpn > /mnt/processed/client.ovpn"

  vpn:
    image: ghcr.io/wfg/openvpn-client:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ovpn-processed:/config:ro
    environment:
      CONFIG_FILE: client.ovpn
      KILL_SWITCH: "off"
    ports:
      - "0.0.0.0:${HOST_PORT_1}:${HOST_PORT_1}/tcp"
      # - "0.0.0.0:${HOST_PORT_2}:${HOST_PORT_2}/tcp"
    healthcheck:
      test: ["CMD-SHELL", "ip link show tun0 | grep -q 'state UP'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      ovpn-init:
        condition: service_completed_successfully
    restart: unless-stopped

  forward-1:
    image: docker.io/alpine/socat:latest
    network_mode: "service:vpn"
    command: TCP-LISTEN:${HOST_PORT_1},fork,reuseaddr TCP:${TARGET_HOST_1}:${TARGET_PORT_1}
    depends_on:
      vpn:
        condition: service_healthy
    restart: unless-stopped

  # forward-2:
  #   image: docker.io/alpine/socat:latest
  #   network_mode: "service:vpn"
  #   command: TCP-LISTEN:${HOST_PORT_2},fork,reuseaddr TCP:${TARGET_HOST_2}:${TARGET_PORT_2}
