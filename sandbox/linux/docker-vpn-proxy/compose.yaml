name: vpn-proxy

volumes:
  ovpn-processed:

services:
  ovpn-init:
    image: docker.io/library/alpine:latest
    volumes:
      - ${OVPN_FILE}:/mnt/client.ovpn:ro
      - ovpn-processed:/mnt/processed
    command: >
      sh -c "IP=$(getent hosts host.containers.internal | awk '{print $1}') &&
             sed s/host.containers.internal/$$IP/g /mnt/client.ovpn > /mnt/processed/client.ovpn"

  vpn:
    image: docker.io/qmcgaw/gluetun:latest
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ovpn-processed:/mnt:ro
    environment:
      VPN_SERVICE_PROVIDER: custom
      VPN_TYPE: openvpn
      OPENVPN_CUSTOM_CONFIG: /mnt/client.ovpn
      OPENVPN_USER: ${VPN_USER:-}
      OPENVPN_PASSWORD: ${VPN_PASSWORD:-}
      HEALTH_TARGET_URLS: http://${TARGET_HOST_1}:${TARGET_PORT_1}
      HEALTH_VPN_DURATION_INITIAL: 0s
    ports:
      - "0.0.0.0:${HOST_PORT_1}:${HOST_PORT_1}/tcp"
      # - "0.0.0.0:${HOST_PORT_2}:${HOST_PORT_2}/tcp"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/v1/vpn/status | grep -q running"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      ovpn-init:
        condition: service_completed_successfully
    restart: unless-stopped

  forward-1:
    image: docker.io/alpine/socat:latest
    network_mode: "service:vpn"
    command: TCP-LISTEN:${HOST_PORT_1},fork,reuseaddr TCP:${TARGET_HOST_1}:${TARGET_PORT_1}
    depends_on:
      vpn:
        condition: service_healthy
    restart: unless-stopped

  # forward-2:
